<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Eksplorator Plików</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>Eksplorator Plików</h1>
            <p>Zaloguj się, aby uzyskać dostęp do plików</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" autocomplete="current-password" required placeholder="Wpisz hasło...">
                    <div class="error-message" id="errorMessage">Nieprawidłowe hasło. Spróbuj ponownie.</div>
                </div>
                <button type="submit" class="login-btn">Zaloguj się</button>
            </form>
        </div>
    </div>

    <!-- Header Actions (outside explorer container for fixed positioning) -->
    <div class="header-actions" id="headerActions" style="display: none;">
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 16 16" fill="currentColor">
                <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.5 4.5 0 1 0-8.999 0A4.5 4.5 0 0 0 11.5 7Z"></path>
            </svg>
            <input type="text" placeholder="Szukaj plików..." id="searchInput">
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
        <div class="date-filter" id="dateFilter">
            <svg class="date-icon" viewBox="0 0 16 16" fill="currentColor">
                <path d="M4.75 0a.75.75 0 0 1 .75.75V2h5V.75a.75.75 0 0 1 1.5 0V2h1.25c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0 1 13.25 16H2.75A1.75 1.75 0 0 1 1 14.25V3.75C1 2.784 1.784 2 2.75 2H4V.75A.75.75 0 0 1 4.75 0ZM2.5 7.5v6.75c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V7.5Zm10.75-4H2.75a.25.25 0 0 0-.25.25V6h11V3.75a.25.25 0 0 0-.25-.25Z"></path>
            </svg>
            <div class="date-inputs">
                <label for="dateFrom">Od:</label>
                <input type="date" id="dateFrom" class="date-input">
                <label for="dateTo">Do:</label>
                <input type="date" id="dateTo" class="date-input">
                <button class="clear-filter-btn" id="clearDateFilter" title="Wyczyść filtr">✕</button>
            </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Wyloguj</button>
    </div>

    <!-- Main Explorer -->
    <div class="explorer-container" id="explorerContainer">
        <header></header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="breadcrumb" id="breadcrumb">
                        <div class="breadcrumb-item active">
                            <svg viewBox="0 0 16 16" fill="currentColor">
                                <path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.23c0-.531.242-1.034.657-1.366l5.25-4.2Z"></path>
                            </svg>
                            Home
                        </div>
                    </div>
                </div>
                <div class="sidebar-content" id="sidebarContent"></div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <div class="content-area" id="contentArea"></div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
