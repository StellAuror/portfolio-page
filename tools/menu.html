<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksplorator Plików</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-card: #1e1e1e;
            --bg-hover: #252525;
            --bg-light: #ffffff;
            --border-color: #2a2a2a;
            --border-accent: #3a3a3a;
            --text-primary: #e6edf3;
            --text-secondary: #9198a8;
            --text-tertiary: #6e7681;
            --accent-primary: #ffffff;
            --accent-secondary: #e6e6e6;
            --accent-purple: #bc8cff;
            --accent-green: #ef4444;
            --accent-orange: #ff9f40;
            --accent-pink: #ff7eb6;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, transparent 70%);
            top: -250px;
            right: -250px;
            animation: pulse 4s ease-in-out infinite;
        }

        .login-container::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(188, 140, 255, 0.1) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            animation: pulse 5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .login-container.fade-out {
            display: none;
        }

        .login-box {
            background: var(--bg-secondary);
            padding: 3rem;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }


        .login-box h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .login-box p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9375rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.625rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            font-size: 0.9375rem;
            outline: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--accent-primary);
            color: #000000;
            border: none;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 255, 255, 0.3);
            background: var(--accent-secondary);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff7b72;
            font-size: 0.8125rem;
            margin-top: 0.625rem;
            display: none;
            padding: 0.5rem;
            background: rgba(255, 123, 114, 0.1);
            border-left: 2px solid #ff7b72;
        }

        .error-message.show {
            display: block;
        }

        /* Main Explorer */
        .explorer-container {
            display: none;
            height: 100vh;
        }

        .explorer-container.active {
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.125rem;
            color: #000000;
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
        }

        .header-title h1 {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.875rem;
            outline: none;
            min-width: 240px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-tertiary);
        }

        .logout-btn {
            padding: 0.5rem 1.25rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-accent);
            color: var(--text-primary);
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-weight: 500;
        }

        .breadcrumb-item svg {
            width: 18px;
            height: 18px;
        }

        .breadcrumb-item:hover {
            color: var(--accent-primary);
            background: var(--bg-hover);
        }

        .breadcrumb-item.active {
            color: var(--text-primary);
            font-weight: 700;
            cursor: default;
        }

        .breadcrumb-item.active:hover {
            background: transparent;
        }

        .breadcrumb-separator {
            color: var(--text-tertiary);
            font-size: 0.875rem;
            font-weight: 300;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* Repository Card Style */
        .repo-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-primary);
            transform: scaleY(0);
            transition: transform 0.2s;
        }

        .repo-card:hover {
            background: var(--bg-hover);
            border-color: var(--border-accent);
            transform: translateX(2px);
        }

        .repo-card:hover::before {
            transform: scaleY(1);
        }

        .repo-card.active {
            background: var(--bg-hover);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 1px var(--accent-primary);
        }

        .repo-card.active::before {
            transform: scaleY(1);
        }

        .repo-header {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .repo-icon {
            width: 20px;
            height: 20px;
            color: var(--text-tertiary);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .repo-icon.folder {
            color: var(--accent-primary);
        }

        .repo-icon.file {
            color: var(--accent-green);
        }

        .repo-info {
            flex: 1;
            min-width: 0;
        }

        .repo-name {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .repo-name:hover {
            color: var(--accent-primary);
        }

        .repo-description {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .repo-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            padding: 0.25rem 0.625rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.2s;
        }

        .tag:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .tag-dot.html {
            background: var(--accent-orange);
        }

        .tag-dot.folder {
            background: var(--accent-primary);
        }

        .tag-dot.design {
            background: var(--accent-pink);
        }

        .tag-dot.prototype {
            background: var(--accent-purple);
        }

        .tag-dot.dax {
            background: var(--accent-primary);
        }

        .tag-dot.tutorial {
            background: var(--accent-purple);
        }

        .tag-dot.quiz {
            background: var(--accent-orange);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem 3rem;
        }

        /* Welcome Screen */
        .welcome-screen {
            max-width: 900px;
            margin: 0 auto;
        }

        .welcome-hero {
            text-align: center;
            padding: 3rem 0 4rem;
            position: relative;
        }

        .welcome-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.15) 0%, transparent 70%);
            z-index: 0;
        }

        .welcome-hero h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 1rem;
            position: relative;
            letter-spacing: -1px;
        }

        .welcome-hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .welcome-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .welcome-stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .welcome-stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-primary);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .welcome-stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }

        .welcome-stat-card:hover::before {
            transform: scaleX(1);
        }

        .welcome-stat-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-primary);
            display: block;
            margin-bottom: 0.5rem;
        }

        .welcome-stat-label {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Folder Description */
        .folder-description {
            max-width: 900px;
        }

        .folder-description h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .folder-description .meta {
            font-size: 0.9375rem;
            color: var(--text-tertiary);
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .folder-description h2 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .folder-description h2::before {
            content: '';
            width: 4px;
            height: 1.75rem;
            background: var(--accent-primary);
        }

        .folder-description h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 2rem;
            margin-bottom: 0.875rem;
        }

        .folder-description p {
            font-size: 1.0625rem;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }

        .folder-description ul {
            margin-left: 1.75rem;
            margin-bottom: 1.25rem;
        }

        .folder-description li {
            font-size: 1.0625rem;
            color: var(--text-secondary);
            margin-bottom: 0.625rem;
            line-height: 1.7;
        }

        /* File Preview */
        .file-preview {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .file-preview-header {
            padding: 1.5rem 3rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .file-preview-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .file-preview-header p {
            font-size: 0.9375rem;
            color: var(--text-secondary);
        }

        .file-preview iframe {
            flex: 1;
            border: none;
            background: #ffffff;
        }

        /* Scrollbar styling */
        .sidebar-content::-webkit-scrollbar,
        .content-area::-webkit-scrollbar {
            width: 10px;
        }

        .sidebar-content::-webkit-scrollbar-track,
        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--border-accent);
            border: 2px solid var(--bg-secondary);
            border-radius: 5px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--border-accent);
            border: 2px solid var(--bg-primary);
            border-radius: 5px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover,
        .content-area::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 320px;
            }

            .search-box input {
                min-width: 180px;
            }
        }

        @media (max-width: 768px) {
            .content-area {
                padding: 1.5rem;
            }

            .welcome-hero h1 {
                font-size: 2rem;
            }

            .welcome-stat-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>Eksplorator Plików</h1>
            <p>Wprowadź hasło, aby uzyskać dostęp do systemu</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" autocomplete="current-password" required placeholder="Wpisz hasło...">
                    <div class="error-message" id="errorMessage">Nieprawidłowe hasło. Spróbuj ponownie.</div>
                </div>
                <button type="submit" class="login-btn">Zaloguj się</button>
            </form>
        </div>
    </div>

    <!-- Main Explorer -->
    <div class="explorer-container" id="explorerContainer">
        <header>
            <div class="header-title">
                <div class="header-logo">E</div>
                <h1>Eksplorator Plików</h1>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.5 4.5 0 1 0-8.999 0A4.5 4.5 0 0 0 11.5 7Z"></path>
                    </svg>
                    <input type="text" placeholder="Szukaj plików...">
                </div>
                <button class="logout-btn" id="logoutBtn">Wyloguj</button>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="breadcrumb" id="breadcrumb">
                        <div class="breadcrumb-item active">
                            <svg viewBox="0 0 16 16" fill="currentColor">
                                <path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.23c0-.531.242-1.034.657-1.366l5.25-4.2Z"></path>
                            </svg>
                            Główny
                        </div>
                    </div>
                </div>
                <div class="sidebar-content" id="sidebarContent"></div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div class="content-area" id="contentArea"></div>
            </main>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            password: 'admin123',
            sessionKey: 'fileExplorerAuth'
        };

        // Tag colors mapping
        const TAG_COLORS = {
            'HTML': { dot: 'html', label: 'HTML' },
            'Gradient': { dot: 'design', label: 'Gradient' },
            'Design': { dot: 'design', label: 'Design' },
            'Prototype': { dot: 'prototype', label: 'Prototype' },
            'Documentation': { dot: 'folder', label: 'Docs' },
            'Branding': { dot: 'design', label: 'Brand' },
            'DAX': { dot: 'dax', label: 'DAX' },
            'Tutorial': { dot: 'tutorial', label: 'Tutorial' },
            'Quiz': { dot: 'quiz', label: 'Quiz' }
        };

        // State
        let folders = [];
        let currentPath = [];
        let currentView = 'root';

        // Elements
        const loginContainer = document.getElementById('loginContainer');
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const explorerContainer = document.getElementById('explorerContainer');
        const logoutBtn = document.getElementById('logoutBtn');
        const sidebarContent = document.getElementById('sidebarContent');
        const contentArea = document.getElementById('contentArea');
        const breadcrumb = document.getElementById('breadcrumb');

        // Icons
        const folderIcon = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M.513 1.513A1.75 1.75 0 0 1 1.75 1h3.5c.55 0 1.07.26 1.4.7l.9 1.2a.25.25 0 0 0 .2.1H13a1 1 0 0 1 1 1v.5H2.75a.75.75 0 0 0 0 1.5h11.978a1 1 0 0 1 .994 1.117L15 13.25A1.75 1.75 0 0 1 13.25 15H1.75A1.75 1.75 0 0 1 0 13.25V2.75c0-.464.184-.91.513-1.237Z"></path></svg>`;
        const fileIcon = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"></path></svg>`;

        // Check session
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem(CONFIG.sessionKey) === 'true') {
                showExplorer();
            }
        });

        // Login handler
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (passwordInput.value === CONFIG.password) {
                sessionStorage.setItem(CONFIG.sessionKey, 'true');
                loginContainer.classList.add('fade-out');
                setTimeout(showExplorer, 300);
            } else {
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 3000);
                passwordInput.value = '';
            }
        });

        // Logout handler
        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem(CONFIG.sessionKey);
            explorerContainer.classList.remove('active');
            loginContainer.classList.remove('fade-out');
            passwordInput.value = '';
            currentPath = [];
            currentView = 'root';
        });

        // Show explorer
        async function showExplorer() {
            explorerContainer.classList.add('active');
            await loadFolders();
            renderView();
        }

        // Load folders
        async function loadFolders() {
            folders = [
                {
                    name: 'odczarujpowerbi',
                    path: 'odczarujpowerbi',
                    description: 'Kurs DAX - podstawy, funkcje agregujące, daty, logika i tekst',
                    tags: ['DAX', 'Tutorial'],
                    files: [
                        { name: '01. Podstawy DAX.html', description: 'Wprowadzenie do języka DAX i podstawowe koncepcje', tags: ['HTML', 'DAX'] },
                        { name: '01. Podstawy DAX - Funkcje agregujące.html', description: 'SUM, AVERAGE, COUNT i inne funkcje agregujące', tags: ['HTML', 'DAX'] },
                        { name: '01. Podstawy DAX - Funkcje dat.html', description: 'Praca z datami w DAX - DATE, YEAR, MONTH', tags: ['HTML', 'DAX'] },
                        { name: '01. Podstawy DAX - Funkcje logiczne.html', description: 'IF, AND, OR i inne funkcje logiczne', tags: ['HTML', 'DAX'] },
                        { name: '01. Podstawy DAX - Funkcje tekstowe.html', description: 'CONCATENATE, LEFT, RIGHT i funkcje tekstowe', tags: ['HTML', 'DAX'] },
                        { name: '01a. Gaps.html', description: 'Luki w wiedzy i częste błędy', tags: ['HTML', 'DAX'] },
                        { name: '01a. Quiz.html', description: 'Quiz sprawdzający wiedzę z podstaw DAX', tags: ['HTML', 'Quiz'] }
                    ]
                },
                {
                    name: 'Projekty Graficzne',
                    path: 'Projekty Graficzne',
                    description: 'Kolekcja projektów graficznych z różnymi schematami kolorystycznymi',
                    tags: ['Design', 'Gradient'],
                    files: [
                        { name: 'ocean.html', description: 'Głęboki gradient inspirowany spokojem oceanu i nieskończonością nieba', tags: ['HTML', 'Gradient'] },
                        { name: 'sunset.html', description: 'Ciepły gradient przypominający zachód słońca nad horyzontem', tags: ['HTML', 'Gradient'] },
                        { name: 'forest.html', description: 'Świeży gradient inspirowany naturalną zielenią lasu', tags: ['HTML', 'Gradient'] }
                    ]
                },
                {
                    name: 'Dokumentacja',
                    path: 'Dokumentacja',
                    description: 'Dokumentacja techniczna i specyfikacje kolorystyczne',
                    tags: ['Documentation'],
                    files: [
                        { name: 'branding.html', description: 'Elegancki czarny gradient dla korporacyjnej identyfikacji wizualnej', tags: ['HTML', 'Branding'] },
                        { name: 'guidelines.html', description: 'Profesjonalny niebieski gradient zgodny z wytycznymi accessibility', tags: ['HTML', 'Documentation'] }
                    ]
                },
                {
                    name: 'Prototypy',
                    path: 'Prototypy',
                    description: 'Kolekcja prototypów interfejsów z różnymi wariantami kolorystycznymi',
                    tags: ['Prototype', 'Design'],
                    files: [
                        { name: 'variant-a.html', description: 'Energiczny gradient różowo-żółty do testów A/B', tags: ['HTML', 'Prototype'] },
                        { name: 'variant-b.html', description: 'Spokojny gradient cyjanowy jako alternatywa do testów', tags: ['HTML', 'Prototype'] },
                        { name: 'dark-mode.html', description: 'Delikatny ciemny gradient zaprojektowany z myślą o redukcji zmęczenia wzroku', tags: ['HTML', 'Prototype'] }
                    ]
                }
            ];
        }

        // Render current view
        function renderView() {
            if (currentPath.length === 0) {
                renderRootView();
            } else if (currentPath.length === 1) {
                renderFolderView(currentPath[0]);
            } else if (currentPath.length === 2) {
                renderFileView(currentPath[0], currentPath[1]);
            }
            updateBreadcrumb();
        }

        // Render root view (folders)
        function renderRootView() {
            sidebarContent.innerHTML = '';
            folders.forEach(folder => {
                const card = createRepoCard(folder, 'folder');
                card.addEventListener('click', () => navigateToFolder(folder));
                sidebarContent.appendChild(card);
            });

            showWelcomeScreen();
        }

        // Render folder view (files)
        function renderFolderView(folder) {
            sidebarContent.innerHTML = '';
            folder.files.forEach(file => {
                const card = createRepoCard(file, 'file');
                card.addEventListener('click', () => navigateToFile(folder, file));
                sidebarContent.appendChild(card);
            });

            showFolderDescription(folder);
        }

        // Create repo card
        function createRepoCard(item, type) {
            const card = document.createElement('div');
            card.className = 'repo-card';

            const icon = type === 'folder' ? folderIcon : fileIcon;
            const iconClass = type === 'folder' ? 'folder' : 'file';

            const tags = item.tags ? item.tags.map(tag => {
                const tagColor = TAG_COLORS[tag] || { dot: 'html', label: tag };
                return `<span class="tag"><span class="tag-dot ${tagColor.dot}"></span>${tagColor.label}</span>`;
            }).join('') : '';

            card.innerHTML = `
                <div class="repo-header">
                    <div class="repo-icon ${iconClass}">${icon}</div>
                    <div class="repo-info">
                        <div class="repo-name">${item.name}</div>
                        <div class="repo-description">${item.description}</div>
                        ${tags ? `<div class="repo-tags">${tags}</div>` : ''}
                    </div>
                </div>
            `;

            return card;
        }

        // Navigation
        function navigateToFolder(folder) {
            currentPath = [folder];
            renderView();
        }

        function navigateToFile(folder, file) {
            currentPath = [folder, file];
            renderView();
        }

        function navigateToRoot() {
            currentPath = [];
            renderView();
        }

        // Update breadcrumb
        function updateBreadcrumb() {
            breadcrumb.innerHTML = '';

            // Home
            const home = document.createElement('div');
            home.className = 'breadcrumb-item' + (currentPath.length === 0 ? ' active' : '');
            home.innerHTML = `
                <svg viewBox="0 0 16 16" fill="currentColor">
                    <path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.23c0-.531.242-1.034.657-1.366l5.25-4.2Z"></path>
                </svg>
                Główny
            `;
            if (currentPath.length > 0) {
                home.addEventListener('click', navigateToRoot);
            }
            breadcrumb.appendChild(home);

            // Folder
            if (currentPath.length >= 1) {
                const sep1 = document.createElement('span');
                sep1.className = 'breadcrumb-separator';
                sep1.textContent = '/';
                breadcrumb.appendChild(sep1);

                const folderItem = document.createElement('div');
                folderItem.className = 'breadcrumb-item' + (currentPath.length === 1 ? ' active' : '');
                folderItem.textContent = currentPath[0].name;
                if (currentPath.length > 1) {
                    folderItem.addEventListener('click', () => {
                        currentPath = [currentPath[0]];
                        renderView();
                    });
                }
                breadcrumb.appendChild(folderItem);
            }

            // File
            if (currentPath.length === 2) {
                const sep2 = document.createElement('span');
                sep2.className = 'breadcrumb-separator';
                sep2.textContent = '/';
                breadcrumb.appendChild(sep2);

                const fileItem = document.createElement('div');
                fileItem.className = 'breadcrumb-item active';
                fileItem.textContent = currentPath[1].name;
                breadcrumb.appendChild(fileItem);
            }
        }

        // Show welcome screen
        function showWelcomeScreen() {
            const totalFiles = folders.reduce((sum, f) => sum + f.files.length, 0);
            contentArea.innerHTML = `
                <div class="welcome-screen">
                    <div class="welcome-hero">
                        <h1>Eksplorator Plików</h1>
                        <p>Zarządzaj swoimi plikami HTML w nowoczesnym i intuicyjnym interfejsie. Wybierz folder z bocznego menu, aby rozpocząć przeglądanie.</p>
                    </div>
                    <div class="welcome-stats">
                        <div class="welcome-stat-card">
                            <span class="welcome-stat-value">${folders.length}</span>
                            <div class="welcome-stat-label">Folderów projektowych</div>
                        </div>
                        <div class="welcome-stat-card">
                            <span class="welcome-stat-value">${totalFiles}</span>
                            <div class="welcome-stat-label">Plików HTML</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Show folder description
        async function showFolderDescription(folder) {
            const description = await loadDescription(folder.path);
            contentArea.innerHTML = `
                <div class="folder-description">
                    <h1>${folder.name}</h1>
                    <div class="meta">
                        <span>${folder.files.length} ${folder.files.length === 1 ? 'plik' : 'plików'}</span>
                    </div>
                    ${description}
                </div>
            `;
        }

        // Load description from HTML file
        async function loadDescription(folderPath) {
            try {
                const htmlPath = `${folderPath}/opis.html`;
                const response = await fetch(htmlPath);
                if (!response.ok) throw new Error('Not found');
                const html = await response.text();
                return html;
            } catch (error) {
                console.log('Error loading description:', error);
                return `<p style="color: var(--text-tertiary);">Brak opisu dla tego folderu.</p>`;
            }
        }

        // Render file view
        function renderFileView(folder, file) {
            const filePath = `${folder.path}/${file.name}`;
            contentArea.innerHTML = `
                <div class="file-preview">
                    <div class="file-preview-header">
                        <h1>${file.name}</h1>
                        <p>${file.description}</p>
                    </div>
                    <iframe src="${filePath}"></iframe>
                </div>
            `;
        }
    </script>
</body>
</html>
