<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Color Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #111111;
            border: 1px solid #333333;
            min-height: 100vh;
        }

        .header {
            background: #000000;
            padding: 15px 20px;
            border-bottom: 1px solid #333333;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5em;
            font-weight: normal;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.85em;
            color: #888888;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 450px;
            min-height: calc(100vh - 80px);
        }

        .svg-container {
            padding: 20px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .svg-wrapper {
            background: #111111;
            border: 1px solid #333333;
            padding: 15px;
            max-width: 100%;
        }

        #dynamic-svg {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .controls-panel {
            background: #111111;
            border-left: 1px solid #333333;
            padding: 20px;
            overflow-y: auto;
        }

        .controls-header {
            margin-bottom: 20px;
        }

        .controls-header h2 {
            color: #ffffff;
            font-size: 1.1em;
            font-weight: normal;
            margin-bottom: 5px;
        }

        .controls-header p {
            color: #888888;
            font-size: 0.8em;
        }

        .color-controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .color-control {
            background: #222222;
            border: 1px solid #333333;
            padding: 10px;
            transition: background-color 0.2s;
        }

        .color-control:hover {
            background: #2a2a2a;
        }

        .color-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .color-name {
            font-size: 0.75em;
            color: #ffffff;
            font-weight: 500;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 0.65em;
            background: #333333;
            color: #cccccc;
            padding: 2px 4px;
            border: 1px solid #444444;
        }

        .color-input-wrapper {
            display: flex;
            gap: 5px;
            margin-bottom: 4px;
        }

        .color-picker {
            width: 25px;
            height: 25px;
            border: 1px solid #444444;
            background: transparent;
            cursor: pointer;
        }

        .color-text-input {
            flex: 1;
            background: #000000;
            border: 1px solid #444444;
            color: #ffffff;
            padding: 4px 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.7em;
        }

        .color-text-input:focus {
            outline: none;
            border-color: #666666;
            background: #111111;
        }

        .color-description {
            font-size: 0.65em;
            color: #666666;
            line-height: 1.2;
        }

        .buttons-container {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .reset-button,
        .export-button {
            flex: 1;
            background: #222222;
            border: 1px solid #444444;
            color: #ffffff;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background-color 0.2s;
        }

        .reset-button:hover,
        .export-button:hover {
            background: #333333;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333333;
            border: 1px solid #444444;
            color: #ffffff;
            padding: 10px 15px;
            font-size: 0.8em;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 1100px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .controls-panel {
                border-left: none;
                border-top: 1px solid #333333;
            }
        }

        @media (max-width: 600px) {
            .color-controls-grid {
                grid-template-columns: 1fr;
            }
            
            .buttons-container {
                flex-direction: column;
            }
        }
    </style>
</head>

    <script>
        const colorPalette = [
            { hex: '#EEEEEE', name: 'Background', description: 'Main background' },
            { hex: '#FF675D', name: 'Primary Red', description: 'Main accent' },
            { hex: '#C5CBCC', name: 'Light Gray', description: 'Secondary elements' },
            { hex: '#BF4D46', name: 'Dark Red', description: 'Red shadows' },
            { hex: '#FFC2BE', name: 'Light Pink', description: 'Pink accents' },
            { hex: '#FF857D', name: 'Coral', description: 'Color transitions' },
            { hex: '#222223', name: 'Black', description: 'Text and lines' },
            { hex: '#A0A0A0', name: 'Mid Gray', description: 'Helper text' },
            { hex: '#FCFCFC', name: 'White', description: 'White elements' },
            { hex: '#CCCCCC', name: 'Gray Boxes', description: 'Gray rectangles' },
            { hex: '#706E6E', name: 'Arrow Gray', description: 'Arrows and icons' }
        ];

        const originalColors = [...colorPalette];
        
        function initializeApp() {
            generateColorControls();
            updateSVGColors();
        }

        function generateColorControls() {
            const container = document.getElementById('color-controls');
            container.innerHTML = '';

            colorPalette.forEach((color, index) => {
                const controlDiv = document.createElement('div');
                controlDiv.className = 'color-control';
                controlDiv.innerHTML = `
                    <div class="color-label">
                        <span class="color-name">${color.name}</span>
                        <span class="color-value" id="value-${index}">${color.hex}</span>
                    </div>
                    <div class="color-input-wrapper">
                        <input type="color" 
                               class="color-picker" 
                               value="${color.hex}" 
                               onchange="updateColor(${index}, this.value)"
                               id="picker-${index}">
                        <input type="text" 
                               class="color-text-input" 
                               value="${color.hex}" 
                               onchange="updateColorFromText(${index}, this.value)"
                               onkeyup="updateColorFromText(${index}, this.value)"
                               id="text-${index}"
                               placeholder="#000000">
                    </div>
                    <div class="color-description">${color.description}</div>
                `;
                container.appendChild(controlDiv);
            });
        }

        function updateColor(index, newColor) {
            if (isValidHexColor(newColor)) {
                colorPalette[index].hex = newColor;
                document.getElementById(`value-${index}`).textContent = newColor;
                document.getElementById(`text-${index}`).value = newColor;
                updateSVGColors();
            }
        }

        function updateColorFromText(index, newColor) {
            if (isValidHexColor(newColor)) {
                colorPalette[index].hex = newColor;
                document.getElementById(`picker-${index}`).value = newColor;
                document.getElementById(`value-${index}`).textContent = newColor;
                updateSVGColors();
            }
        }

        function isValidHexColor(hex) {
            return /^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/.test(hex);
        }

        function updateSVGColors() {
            const svg = document.getElementById('dynamic-svg');
            const svgElements = svg.querySelectorAll('[fill], [stroke]');

            const colorMap = {
                '#EEEEEE': colorPalette[0].hex,
                '#FF675D': colorPalette[1].hex,
                '#C5CBCC': colorPalette[2].hex,
                '#BF4D46': colorPalette[3].hex,
                '#FFC2BE': colorPalette[4].hex,
                '#FF857D': colorPalette[5].hex,
                '#222223': colorPalette[6].hex,
                '#A0A0A0': colorPalette[7].hex,
                '#FCFCFC': colorPalette[8].hex,
                'white': colorPalette[8].hex,
                '#CCCCCC': colorPalette[9].hex,
                '#706E6E': colorPalette[10].hex,
                'black': colorPalette[6].hex
            };

            svgElements.forEach(element => {
                const fillColor = element.getAttribute('fill');
                if (fillColor && colorMap[fillColor]) {
                    element.setAttribute('fill', colorMap[fillColor]);
                }

                const strokeColor = element.getAttribute('stroke');
                if (strokeColor && colorMap[strokeColor]) {
                    element.setAttribute('stroke', colorMap[strokeColor]);
                }
            });
        }

        function resetColors() {
            colorPalette.forEach((color, index) => {
                color.hex = originalColors[index].hex;
                document.getElementById(`picker-${index}`).value = color.hex;
                document.getElementById(`text-${index}`).value = color.hex;
                document.getElementById(`value-${index}`).textContent = color.hex;
            });
            updateSVGColors();
        }

        function exportSVG() {
            const svg = document.getElementById('dynamic-svg');
            const svgData = new XMLSerializer().serializeToString(svg);
            
            navigator.clipboard.writeText(svgData).then(() => {
                showToast();
            }).catch(() => {
                const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(svgBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'customized-svg.svg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('SVG downloaded!');
            });
        }

        function showToast(message = 'SVG copied!') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
